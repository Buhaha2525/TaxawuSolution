<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <meta name="theme-color" content="#667eea">
    <meta name="description" content="Créez votre compte Taxawu Solution">
    <title>Inscription - Taxawu Solution</title>

    <!-- Preload des ressources critiques -->
    <link rel="preload" href="/css/register.css" as="style">
    <link rel="preload" href="/vendor/fontawesome/webfonts/fa-solid-900.woff2" as="font" crossorigin>
    <link rel="preconnect" href="https://cdnjs.cloudflare.com">

    <!-- CSS critique inline (affiché immédiatement, pas de requête réseau) -->
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:linear-gradient(135deg,#667eea,#764ba2);min-height:100vh;display:flex;justify-content:center;align-items:center;padding:20px}
        .container{max-width:420px;width:100%;background:#fff;border-radius:28px;padding:30px 25px;box-shadow:0 25px 50px -12px rgba(0,0,0,.25)}
        .logo{text-align:center;margin-bottom:25px}
        .logo i{font-size:48px;color:#667eea}
        .logo h1{font-size:26px;color:#1a1a2e;margin-top:8px}
        .logo p{font-size:13px;color:#666;margin-top:5px}
        .form-group{margin-bottom:16px}
        label{display:flex;align-items:center;gap:8px;margin-bottom:8px;color:#333;font-weight:600;font-size:14px}
        label i{color:#667eea;width:18px;text-align:center}
        input{width:100%;padding:14px 16px;border:2px solid #e0e0e0;border-radius:15px;font-size:15px;background:#f8f9fa}
        input:focus{outline:none;border-color:#667eea;background:#fff}
        button{width:100%;padding:15px;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border:none;border-radius:15px;font-size:16px;font-weight:700;cursor:pointer;margin-top:10px}
        .login-link{text-align:center;margin-top:20px;color:#666;font-size:14px}
        .login-link a{color:#667eea;text-decoration:none;font-weight:600}
        .error{background:#ffebee;color:#f44336;padding:12px;border-radius:12px;margin-bottom:20px;display:none;font-size:14px;text-align:center}
        .spinner{display:none;text-align:center;margin-top:15px}
        .loader{width:36px;height:36px;border:3px solid #f3f3f3;border-top-color:#667eea;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto}
        @keyframes spin{to{transform:rotate(360deg)}}
    </style>

    <!-- CSS externe chargé de manière asynchrone (non bloquant) -->
    <link rel="stylesheet" href="/css/register.css" media="print" onload="this.media='all';this.onload=null">
    <link rel="stylesheet" href="/vendor/fontawesome/css/all.min.css" media="print" onload="this.media='all';this.onload=null">

    <!-- Fallback si JavaScript désactivé -->
    <noscript>
        <link rel="stylesheet" href="/css/register.css">
        <link rel="stylesheet" href="/vendor/fontawesome/css/all.min.css">
    </noscript>
</head>
<body>
<div class="container">
    <div class="logo">
        <i class="fas fa-user-plus"></i>
        <h1>Inscription</h1>
        <p>Créez votre compte propriétaire</p>
    </div>

    <div class="error" id="errorMsg"></div>

    <form id="registerForm" autocomplete="on">
        <div class="form-group">
            <label for="name"><i class="fas fa-user"></i> Nom complet</label>
            <input type="text" id="name" placeholder="Votre nom complet" required autocomplete="name">
        </div>
        <div class="form-group">
            <label for="email"><i class="fas fa-envelope"></i> Email</label>
            <input type="email" id="email" placeholder="exemple@email.com" required autocomplete="email">
        </div>
        <div class="form-group">
            <label for="phone"><i class="fas fa-phone"></i> Téléphone</label>
            <input type="tel" id="phone" placeholder="771234567" required autocomplete="tel">
        </div>
        <div class="form-group">
            <label for="companyName"><i class="fas fa-building"></i> Entreprise (optionnel)</label>
            <input type="text" id="companyName" placeholder="Nom de votre entreprise" autocomplete="organization">
        </div>
        <div class="form-group">
            <label for="password"><i class="fas fa-lock"></i> Mot de passe</label>
            <input type="password" id="password" placeholder="Minimum 6 caractères" required autocomplete="new-password" minlength="6">
        </div>
        <div class="form-group">
            <label for="confirmPassword"><i class="fas fa-check-circle"></i> Confirmer le mot de passe</label>
            <input type="password" id="confirmPassword" placeholder="Répétez le mot de passe" required autocomplete="new-password" minlength="6">
        </div>
        <button type="submit">
            <i class="fas fa-user-plus"></i> Créer mon compte
        </button>
    </form>

    <div class="spinner" id="spinner" style="display:none;">
        <div class="loader"></div>
        <p style="margin-top:10px;color:#666;font-size:13px;">Création du compte...</p>
    </div>

    <div class="login-link">
        Déjà un compte ? <a href="/login">Se connecter</a>
    </div>
</div>

<script src="/js/register.js"></script>
</body>
</html>
