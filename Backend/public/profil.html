<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>Mon Compte - AquaSass</title>
    <link rel="stylesheet" href="/vendor/fontawesome/css/all.min.css">
    <link rel="stylesheet" href="/css/dashboard.css">
    <link rel="stylesheet" href="/css/profil.css">
</head>
<body>

<!-- ============================================ -->
<!-- HEADER -->
<!-- ============================================ -->
<header class="header">
    <div class="header-left">
        <div class="logo">
            <i class="fas fa-robot"></i>
            <span>Aqua<span class="logo-highlight">Sass</span></span>
        </div>
    </div>
    <div class="header-right">
        <nav class="header-nav">
            <a href="/dashboard" class="nav-btn nav-distributeur">
                <i class="fas fa-chart-bar"></i><span>Dashboard</span>
            </a>
            <a href="/distributeur" class="nav-btn nav-profil">
                <i class="fas fa-microchip"></i><span>ESP32</span>
            </a>
        </nav>
        <button class="btn-logout" onclick="logout()" title="Déconnexion">
            <i class="fas fa-sign-out-alt"></i>
        </button>
    </div>
</header>

<!-- ============================================ -->
<!-- MAIN CONTENT -->
<!-- ============================================ -->
<main class="main-content">
    <div class="welcome-card">
        <h1>👤 Mon Compte</h1>
        <p>Gérez vos informations personnelles</p>
    </div>

    <!-- Infos profil -->
    <div class="card">
        <h3><i class="fas fa-info-circle"></i> Informations</h3>
        <div class="profile-info-grid" id="profileInfo">
            <p>Chargement...</p>
        </div>
    </div>

    <!-- Changer mot de passe -->
    <div class="card" style="margin-top:20px;">
        <h3><i class="fas fa-lock"></i> Changer le mot de passe</h3>
        <div id="passwordMsg" class="msg"></div>
        <div class="form-group">
            <label>Mot de passe actuel</label>
            <input type="password" id="currentPassword" placeholder="••••••••">
        </div>
        <div class="form-group">
            <label>Nouveau mot de passe</label>
            <input type="password" id="newPassword" placeholder="Min. 6 caractères">
        </div>
        <div class="form-group">
            <label>Confirmer le mot de passe</label>
            <input type="password" id="confirmPassword" placeholder="••••••••">
        </div>
        <button class="btn-primary" onclick="changePassword()">
            <i class="fas fa-check"></i> Changer le mot de passe
        </button>
    </div>
</main>

<script src="/js/profil.js"></script>
</body>
</html>
