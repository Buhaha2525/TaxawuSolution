<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <meta name="theme-color" content="#667eea">
    <title>Nouveau mot de passe - AquaSass</title>
    <link rel="stylesheet" href="/vendor/fontawesome/css/all.min.css">
    <link rel="stylesheet" href="/css/login.css">
</head>
<body>
<div class="container">
    <div class="logo">
        <i class="fas fa-lock"></i>
        <h1>Nouveau mot de passe</h1>
        <p>Choisissez un nouveau mot de passe sécurisé</p>
    </div>

    <div id="errorMsg" class="error" style="display:none;"></div>
    <div id="successMsg" style="display:none;text-align:center;color:green;margin:10px 0;"></div>

    <form id="resetForm" autocomplete="off">
        <div class="form-group">
            <label for="newPassword"><i class="fas fa-lock"></i> Nouveau mot de passe</label>
            <input type="password" id="newPassword" placeholder="Min. 6 caractères" required minlength="6" autocomplete="new-password">
        </div>
        <div class="form-group">
            <label for="confirmPassword"><i class="fas fa-check-circle"></i> Confirmer le mot de passe</label>
            <input type="password" id="confirmPassword" placeholder="Répétez le mot de passe" required autocomplete="new-password">
        </div>
        <button type="submit">
            <i class="fas fa-check"></i> Réinitialiser le mot de passe
        </button>
    </form>

    <div class="register-link">
        <a href="/login">← Retour à la connexion</a>
    </div>
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('token');

    // Vérifier si le token est présent
    if (!token) {
        document.getElementById('errorMsg').textContent = 'Lien invalide ou expiré.';
        document.getElementById('errorMsg').style.display = 'block';
        document.getElementById('resetForm').style.display = 'none';
    }

    document.getElementById('resetForm').addEventListener('submit', async (e) => {
        e.preventDefault();

        const newPassword = document.getElementById('newPassword').value;
        const confirmPassword = document.getElementById('confirmPassword').value;
        const errorMsg = document.getElementById('errorMsg');
        const successMsg = document.getElementById('successMsg');

        // Validation
        errorMsg.style.display = 'none';
        successMsg.style.display = 'none';

        if (newPassword !== confirmPassword) {
            errorMsg.textContent = 'Les mots de passe ne correspondent pas.';
            errorMsg.style.display = 'block';
            return;
        }

        if (newPassword.length < 6) {
            errorMsg.textContent = 'Le mot de passe doit contenir au moins 6 caractères.';
            errorMsg.style.display = 'block';
            return;
        }

        // Désactiver le bouton
        const button = document.querySelector('button');
        button.disabled = true;
        button.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Réinitialisation...';

        try {
            const res = await fetch('/api/auth/reset-password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token, newPassword })
            });
            const data = await res.json();

            if (data.success) {
                successMsg.textContent = '✅ Mot de passe réinitialisé avec succès ! Redirection...';
                successMsg.style.display = 'block';
                document.getElementById('resetForm').style.display = 'none';
                setTimeout(() => window.location.href = '/login', 2000);
            } else {
                errorMsg.textContent = data.message || 'Erreur lors de la réinitialisation.';
                errorMsg.style.display = 'block';
                button.disabled = false;
                button.innerHTML = '<i class="fas fa-check"></i> Réinitialiser le mot de passe';
            }
        } catch (error) {
            errorMsg.textContent = 'Erreur de connexion au serveur.';
            errorMsg.style.display = 'block';
            button.disabled = false;
            button.innerHTML = '<i class="fas fa-check"></i> Réinitialiser le mot de passe';
        }
    });
</script>
</body>
</html>
