<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <meta name="theme-color" content="#667eea">
    <title>Mot de passe oublié - AquaSass</title>
    <link rel="stylesheet" href="/vendor/fontawesome/css/all.min.css">
    <link rel="stylesheet" href="/css/login.css">
</head>
<body>
<div class="container">
    <div class="logo">
        <i class="fas fa-key"></i>
        <h1>Mot de passe oublié</h1>
        <p>Réinitialisez votre mot de passe</p>
    </div>

    <div id="step1">
        <div class="form-group">
            <label for="email"><i class="fas fa-envelope"></i> Votre email</label>
            <input type="email" id="email" placeholder="exemple@email.com" required>
        </div>
        <button onclick="sendResetLink()">
            <i class="fas fa-paper-plane"></i> Envoyer le lien
        </button>
        <div id="msg1" style="text-align:center;margin-top:10px;font-size:14px;"></div>
    </div>

    <div id="step2" style="display:none;">
        <div class="form-group">
            <label for="token"><i class="fas fa-hashtag"></i> Token reçu</label>
            <input type="text" id="token" placeholder="Token" required>
        </div>
        <div class="form-group">
            <label for="newPassword"><i class="fas fa-lock"></i> Nouveau mot de passe</label>
            <input type="password" id="newPassword" placeholder="Min. 6 caractères" required>
        </div>
        <button onclick="resetPassword()">
            <i class="fas fa-check"></i> Réinitialiser
        </button>
        <div id="msg2" style="text-align:center;margin-top:10px;font-size:14px;"></div>
    </div>

    <div id="step3" style="display:none;text-align:center;">
        <p style="font-size:60px;">✅</p>
        <p style="color:green;font-size:18px;margin:15px 0;">Mot de passe réinitialisé !</p>
        <a href="/login" style="display:inline-block;padding:12px 30px;background:linear-gradient(135deg,#667eea,#764ba2);color:white;border-radius:25px;text-decoration:none;font-weight:500;">
            Se connecter
        </a>
    </div>

    <div style="text-align:center;margin-top:20px;">
        <a href="/login" style="color:#667eea;text-decoration:none;">← Retour à la connexion</a>
    </div>
</div>

<script src="/js/forgot-password.js"></script>
</body>
</html>
