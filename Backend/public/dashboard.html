<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>Dashboard - AquaSass</title>

    <!-- PWA -->
    <link  rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="AquaSass">
    <link rel="apple-touch-icon" href="/icon-192.png">
    <meta name="theme-color" content="#667eea">


    <link rel="stylesheet" href="/vendor/fontawesome/css/all.min.css">
    <link rel="stylesheet" href="/css/dashboard.css">
    <link rel="preconnect" href="https://cdnjs.cloudflare.com">
</head>
<body>

<!-- ============================================ -->
<!-- HEADER PROFESSIONNEL -->
<!-- ============================================ -->
<header class="header">
    <div class="header-left">
        <div class="logo">
            <i class="fas fa-robot"></i>
            <span>Aqua<span class="logo-highlight">Sass</span></span>
        </div>
    </div>

    <div class="header-center">
        <div class="machine-selector-wrapper">
            <i class="fas fa-microchip"></i>
            <select id="machineSelector" onchange="onMainMachineChange()">
                <option value="">Toutes les machines</option>
            </select>
        </div>
    </div>

    <div class="header-right">
        <div class="header-user">
            <div class="user-avatar">
                <i class="fas fa-user-circle"></i>
            </div>
            <span class="user-name" id="userName">Chargement...</span>
        </div>

        <nav class="header-nav">
            <a href="/profil" class="nav-btn nav-profil" title="Mon profil">
                <i class="fas fa-id-card"></i><span>Profil</span>
            </a>
            <a href="/distributeur" class="nav-btn nav-distributeur" title="Distributeur">
                <i class="fas fa-microchip"></i><span>ESP32</span>
            </a>
            <!-- 🆕 Lien Admin (caché par défaut, visible si ADMIN) -->
            <a href="/admin" id="adminLink" class="nav-btn" style="display:none;background:#fce4ec;color:#c62828;" title="Administration">
                <i class="fas fa-crown"></i><span>Admin</span>
            </a>
            <a href="javascript:void(0)" onclick="exportCSV()" class="nav-btn nav-add" title="Exporter CSV">
                <i class="fas fa-download"></i><span>CSV</span>
            </a>
            <button class="nav-btn nav-add" onclick="openAddMachineModal()" title="Ajouter une machine">
                <i class="fas fa-plus-circle"></i><span>Machine</span>
            </button>
        </nav>

        <button class="btn-logout" onclick="logout()" title="Déconnexion">
            <i class="fas fa-sign-out-alt"></i>
        </button>
    </div>
</header>

<!-- ============================================ -->
<!-- MAIN CONTENT -->
<!-- ============================================ -->
<main class="main-content">
    <div class="welcome-card">
        <h1>Bonjour, <span id="welcomeName"></span> !</h1>
        <p>Bienvenue sur votre tableau de bord de gestion</p>
    </div>

    <div class="stats-grid" id="statsGrid"></div>

    <div class="chart-card">
        <h3>🚰 Mes machines</h3>
        <div class="machines-grid" id="machinesGrid">
            <p>Chargement...</p>
        </div>
    </div>
</main>

<!-- Modal Ajout Machine -->
<div class="modal" id="addMachineModal">
    <div class="modal-content">
        <div class="modal-title">➕ Ajouter une machine</div>
        <input type="text" id="newMachineId" placeholder="ID Machine (ex: MACHINE3)" required>
        <input type="text" id="newMachineName" placeholder="Nom de la machine" required>
        <input type="text" id="newMachineLocation" placeholder="Emplacement" required>
        <button onclick="addMachine()">Ajouter</button>
        <button class="close-modal" onclick="closeAddMachineModal()">Fermer</button>
    </div>
</div>

<!-- Modal Modification Machine -->
<div class="modal" id="editMachineModal">
    <div class="modal-content">
        <div class="modal-title">✏️ Modifier la machine</div>
        <input type="hidden" id="editMachineId">
        <input type="text" id="editMachineName" placeholder="Nom de la machine" required>
        <input type="text" id="editMachineLocation" placeholder="Emplacement" required>
        <select id="editMachineStatus">
            <option value="ACTIVE">Active</option>
            <option value="INACTIVE">Inactive</option>
            <option value="MAINTENANCE">Maintenance</option>
        </select>
        <button onclick="updateMachine()">💾 Enregistrer</button>
        <button class="close-modal" onclick="closeEditMachineModal()">Annuler</button>
    </div>
</div>

<script src="/js/dashboard.js"></script>
<script src="/vendor/chartjs/chart.min.js"></script>
</body>
</html>
